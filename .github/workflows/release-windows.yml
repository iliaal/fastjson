name: Release Windows binaries

# Triggered when a GitHub Release is published. Builds the extension on
# every supported PHP version x architecture x thread-safety variant on
# Windows runners, then uploads each .dll as a release asset following the
# PIE-compatible naming convention
# (php_fastjson-<version>-<php_x.y>-<ts|nts>-vs17-<arch>.zip).

on:
  pull_request:
    branches: [master]
  release:
    types: [published]
  # Manual build-only validation before tagging. On workflow_dispatch the
  # matrix + build (with tests) run but the upload job is skipped, so a
  # maintainer can confirm the Windows lanes compile on the release commit
  # without publishing assets to a non-existent release.
  workflow_dispatch:

jobs:
  matrix:
    name: Resolve Windows release matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        uses: php/php-windows-builder/extension-matrix@v1
        with:
          # Pull requests run a TS/NTS PHP 8.4 canary. Releases and manual
          # dispatches keep the full supported-version matrix.
          php-version-list: ${{ github.event_name == 'pull_request' && '8.4' || '8.1, 8.2, 8.3, 8.4, 8.5' }}
          # 64-bit only. fastjson's integer-valued-double encoding diverges
          # from ext/json on 32-bit (ILP32) for values above 2^31; 32-bit
          # Windows is not a supported target.
          arch-list: 'x64'

  build:
    name: Build ${{ matrix.php-version }} ${{ matrix.ts }} ${{ matrix.arch }}
    needs: matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}
          run-tests: 'true'

  release:
    name: Upload binaries to the release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: php/php-windows-builder/release@v1
        with:
          release: ${{ github.event.release.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
