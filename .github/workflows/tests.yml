name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate composer.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - run: composer validate --strict
      - run: scripts/check-project-metadata.sh

  pie-smoke:
    name: PIE install smoke
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - name: PIE install, load, and function smoke
        run: docker run --rm -v "$PWD:/fastjson:ro" php:8.4-cli bash /fastjson/scripts/pie-smoke.sh

  linux:
    name: PHP ${{ matrix.php }} - Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 8.6 is pre-release; keep it in the source-build gate without
        # publishing release binaries until PHP declares it stable.
        php: ['8.1', '8.2', '8.3', '8.4', '8.5', '8.6']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config

      - name: Build extension
        shell: bash
        run: |
          set -euo pipefail
          phpize
          ./configure --enable-fastjson
          # pipefail makes a failing `make` fail the step: the old
          # `make | tee | grep -c || true` swallowed make's exit status
          # (GitHub's default shell does not set pipefail), so a broken
          # build could pass and the tests would then merely skip.
          make -j"$(nproc)" 2>&1 | tee build.log
          if grep -q 'warning:' build.log; then
            echo "::error::Build produced warning(s)"
            grep 'warning:' build.log || true
            exit 1
          fi

      - name: Run tests
        shell: bash
        run: |
          # -uo pipefail but not -e: the explicit checks below own failure
          # detection, and -e would abort the tee'd run-tests pipeline before
          # they run (hiding the summary) when run-tests exits non-zero.
          set -uo pipefail
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/fastjson.so"
          export NO_INTERACTION=1
          # A bad module ABI loads no extension, so every PHPT SKIPs and the
          # summary reports 0 failures -- a green run that tested nothing.
          # Fail fast unless the extension actually loaded. Capture first,
          # then match: piping `php -m` straight into `grep -q` lets grep
          # close the pipe on the first hit, SIGPIPEs php, and trips pipefail.
          mods=$(php $TEST_PHP_ARGS -m)
          grep -qix fastjson <<< "$mods" \
            || { echo "::error::fastjson extension failed to load"; exit 1; }
          # tee (not $(...)) so the run-tests summary and diffs are always
          # visible: under set -e a `RESULT=$(...)` assignment aborts before
          # echo when run-tests exits non-zero, hiding which test failed.
          php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK \
              tests/ tests/upstream-json/ 2>&1 | tee /tmp/test-output.txt
          run_status=${PIPESTATUS[0]}
          if ! grep -q 'Number of tests' /tmp/test-output.txt; then
            echo "::error::run-tests.php produced no summary (aborted?), status $run_status"
            exit 1
          fi
          if grep -qiE 'Tests (failed|leaked|borked)[[:space:]]*:[[:space:]]*[1-9]' /tmp/test-output.txt; then
            echo "::error::tests failed/leaked/borked"
            exit 1
          fi
          if [ "$run_status" -ne 0 ]; then
            echo "::error::run-tests.php exited with status $run_status"
            exit 1
          fi

  macos:
    name: PHP ${{ matrix.php }} - macOS
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config

      - name: Build extension
        run: |
          phpize
          ./configure --enable-fastjson
          make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        shell: bash
        run: |
          # -uo pipefail but not -e: the explicit checks below own failure
          # detection, and -e would abort the tee'd run-tests pipeline before
          # they run (hiding the summary) when run-tests exits non-zero.
          set -uo pipefail
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/fastjson.so"
          export NO_INTERACTION=1
          # A bad module ABI loads no extension, so every PHPT SKIPs and the
          # summary reports 0 failures -- a green run that tested nothing.
          # Fail fast unless the extension actually loaded. Capture first,
          # then match: piping `php -m` straight into `grep -q` lets grep
          # close the pipe on the first hit, SIGPIPEs php, and trips pipefail.
          mods=$(php $TEST_PHP_ARGS -m)
          grep -qix fastjson <<< "$mods" \
            || { echo "::error::fastjson extension failed to load"; exit 1; }
          # tee (not $(...)) so the run-tests summary and diffs are always
          # visible: under set -e a `RESULT=$(...)` assignment aborts before
          # echo when run-tests exits non-zero, hiding which test failed.
          php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK \
              tests/ tests/upstream-json/ 2>&1 | tee /tmp/test-output.txt
          run_status=${PIPESTATUS[0]}
          if ! grep -q 'Number of tests' /tmp/test-output.txt; then
            echo "::error::run-tests.php produced no summary (aborted?), status $run_status"
            exit 1
          fi
          if grep -qiE 'Tests (failed|leaked|borked)[[:space:]]*:[[:space:]]*[1-9]' /tmp/test-output.txt; then
            echo "::error::tests failed/leaked/borked"
            exit 1
          fi
          if [ "$run_status" -ne 0 ]; then
            echo "::error::run-tests.php exited with status $run_status"
            exit 1
          fi

  asan:
    name: PHP ${{ matrix.php }} - ASAN
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 8.3 covers the pre-8.4 hooked-property path and the
        # zend_call_stack_overflowed fallback boundary; 8.5 covers the
        # newest property-hook / read_property code path. Memory-safety
        # bugs there (recursion guards, retval_stash UAF) are version-
        # sensitive, so sanitize more than just 8.4.
        php: ['8.3', '8.4', '8.5']

    env:
      # detect_leaks=1 is pinned explicitly. LSan's default is on under
      # Linux ASan, so this matches today's default — pinning prevents
      # a future ASAN_OPTIONS edit from silently flipping it. Narrow
      # known-good leaks (vendored MINIT singletons etc.) go in
      # .github/lsan-suppressions.txt; prefer that over blanket
      # detect_leaks=0. See ~/ai/wiki/debugging/asan-php-extension.md.
      ASAN_OPTIONS: exitcode=139:verify_asan_link_order=0:detect_odr_violation=0:detect_leaks=1
      LSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/lsan-suppressions.txt:print_suppressions=0
      UBSAN_OPTIONS: print_stacktrace=1
      USE_ZEND_ALLOC: 0
      USE_TRACKED_ALLOC: 1

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y llvm clang re2c bison autoconf

      - name: Configure runtime for ASAN
        # Two GitHub-runner-specific gotchas that turn the configure
        # step into "cannot run C compiled programs":
        #
        # 1. -shared-libasan links the asan runtime as a separate .so so
        #    that __cxa_throw stays resolvable across dlopen(); without
        #    LD_LIBRARY_PATH pointing at clang's resource dir, every
        #    asan-instrumented binary fails at startup with
        #    "error while loading shared libraries: libclang_rt.asan-*.so".
        #
        # 2. Recent Ubuntu kernels default to 32-bit mmap entropy, which
        #    collides with ASAN's shadow-memory layout. Knocking
        #    vm.mmap_rnd_bits down to 28 puts it back in range.
        run: |
          ASAN_LIB_DIR=$(clang -print-resource-dir)/lib/linux
          echo "LD_LIBRARY_PATH=$ASAN_LIB_DIR" >>"$GITHUB_ENV"
          sudo sysctl -w vm.mmap_rnd_bits=28

      - name: Build PHP with ASAN (-shared-libasan keeps __cxa_throw resolvable across dlopen)
        run: |
          git clone --depth=1 --branch=PHP-${{ matrix.php }} https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure \
            --enable-debug \
            --disable-zts \
            --disable-all \
            --enable-cli \
            --prefix=/tmp/php-asan \
            || { echo "==== config.log tail ===="; tail -200 config.log; exit 1; }
          make -j$(nproc)
          make install

      - name: Build extension with ASAN
        run: |
          export PATH="/tmp/php-asan/bin:$PATH"
          phpize
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          CXXFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure \
            --enable-fastjson \
            --with-php-config=/tmp/php-asan/bin/php-config
          make -j$(nproc)

      - name: Run tests under ASAN
        shell: bash
        run: |
          set -uo pipefail
          export TEST_PHP_EXECUTABLE=/tmp/php-asan/bin/php
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/fastjson.so"
          export NO_INTERACTION=1
          mods=$(/tmp/php-asan/bin/php $TEST_PHP_ARGS -m)
          grep -qix fastjson <<< "$mods" \
            || { echo "::error::fastjson extension failed to load under ASAN"; exit 1; }
          # No `|| true`: it masked the runner exit status, so an ASAN abort
          # or a no-summary exit read as success. Capture the status, then
          # look beyond "Tests failed" (leaks/borks are distinct classes)
          # and confirm a summary was actually produced.
          /tmp/php-asan/bin/php run-tests.php --show-diff --asan -g FAIL,BORK,LEAK,XLEAK \
              tests/ tests/upstream-json/ 2>&1 | tee /tmp/test-output.txt
          run_status=${PIPESTATUS[0]}
          if ! grep -q 'Number of tests' /tmp/test-output.txt; then
            echo "::error::run-tests.php produced no summary under ASAN (aborted?), status $run_status"
            exit 1
          fi
          if grep -qiP 'Tests (failed|leaked|borked)\s*:\s*[1-9]' /tmp/test-output.txt; then
            echo "::error::Tests failed/leaked/borked under ASAN"
            exit 1
          fi
          if [ "$run_status" -ne 0 ]; then
            echo "::error::run-tests.php exited with status $run_status under ASAN"
            exit 1
          fi
