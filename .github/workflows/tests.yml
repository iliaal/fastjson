name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate composer.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - run: composer validate --strict

  pie-smoke:
    name: PIE install smoke
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: phpize, php-config
          coverage: none
      - name: Install PIE build prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends bison libtool-bin
      - name: Download PIE
        run: |
          curl -fsSL -o /tmp/pie.phar https://github.com/php/pie/releases/latest/download/pie.phar
          chmod +x /tmp/pie.phar
      - name: PIE build smoke
        run: |
          php /tmp/pie.phar repository:add path .
          php /tmp/pie.phar build iliaal/fastjson:*@dev --enable-fastjson

  linux:
    name: PHP ${{ matrix.php }} - Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config

      - name: Build extension
        run: |
          phpize
          ./configure --enable-fastjson
          WARNINGS=$(make -j$(nproc) 2>&1 | tee /dev/stderr | grep -c 'warning:' || true)
          if [ "$WARNINGS" -gt 0 ]; then
            echo "::error::Build produced $WARNINGS warning(s)"
            exit 1
          fi

      - name: Run tests
        run: |
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/fastjson.so"
          export NO_INTERACTION=1
          RESULT=$(php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK \
                       tests/ tests/upstream-json/ 2>&1)
          echo "$RESULT"
          FAILED=$(echo "$RESULT" | grep 'Tests failed' | grep -oP '\d+' | head -1)
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED test(s) failed"
            exit 1
          fi

  macos:
    name: PHP ${{ matrix.php }} - macOS
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config

      - name: Build extension
        run: |
          phpize
          ./configure --enable-fastjson
          make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/fastjson.so"
          export NO_INTERACTION=1
          RESULT=$(php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK \
                       tests/ tests/upstream-json/ 2>&1)
          echo "$RESULT"
          FAILED=$(echo "$RESULT" | grep 'Tests failed' | grep -oP '\d+' | head -1)
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED test(s) failed"
            exit 1
          fi

  asan:
    name: PHP ${{ matrix.php }} - ASAN
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    env:
      ASAN_OPTIONS: exitcode=139:verify_asan_link_order=0:detect_odr_violation=0
      UBSAN_OPTIONS: print_stacktrace=1
      USE_ZEND_ALLOC: 0
      USE_TRACKED_ALLOC: 1

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y llvm clang re2c bison autoconf

      - name: Configure runtime for ASAN
        # Two GitHub-runner-specific gotchas that turn the configure
        # step into "cannot run C compiled programs":
        #
        # 1. -shared-libasan links the asan runtime as a separate .so so
        #    that __cxa_throw stays resolvable across dlopen(); without
        #    LD_LIBRARY_PATH pointing at clang's resource dir, every
        #    asan-instrumented binary fails at startup with
        #    "error while loading shared libraries: libclang_rt.asan-*.so".
        #
        # 2. Recent Ubuntu kernels default to 32-bit mmap entropy, which
        #    collides with ASAN's shadow-memory layout. Knocking
        #    vm.mmap_rnd_bits down to 28 puts it back in range.
        run: |
          ASAN_LIB_DIR=$(clang -print-resource-dir)/lib/linux
          echo "LD_LIBRARY_PATH=$ASAN_LIB_DIR" >>"$GITHUB_ENV"
          sudo sysctl -w vm.mmap_rnd_bits=28

      - name: Build PHP with ASAN (-shared-libasan keeps __cxa_throw resolvable across dlopen)
        run: |
          git clone --depth=1 --branch=PHP-${{ matrix.php }} https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure \
            --enable-debug \
            --disable-zts \
            --disable-all \
            --enable-cli \
            --prefix=/tmp/php-asan \
            || { echo "==== config.log tail ===="; tail -200 config.log; exit 1; }
          make -j$(nproc)
          make install

      - name: Build extension with ASAN
        run: |
          export PATH="/tmp/php-asan/bin:$PATH"
          phpize
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          CXXFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure \
            --enable-fastjson \
            --with-php-config=/tmp/php-asan/bin/php-config
          make -j$(nproc)

      - name: Run tests under ASAN
        run: |
          export TEST_PHP_EXECUTABLE=/tmp/php-asan/bin/php
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/fastjson.so"
          export NO_INTERACTION=1
          /tmp/php-asan/bin/php run-tests.php --show-diff --asan -g FAIL,BORK,LEAK,XLEAK \
              tests/ tests/upstream-json/ 2>&1 | tee /tmp/test-output.txt || true
          if grep -qP 'Tests failed\s*:\s*[1-9]' /tmp/test-output.txt; then
            echo "::error::Tests failed under ASAN"
            exit 1
          fi
